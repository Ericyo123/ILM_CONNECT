version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ilmconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ilmconnect
      POSTGRES_PASSWORD: ilmconnect_dev_2024
      POSTGRES_DB: ilmconnect
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ilmconnect']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ilmconnect-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
